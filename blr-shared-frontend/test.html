<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLR Shared Frontend Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div id="nav-placeholder"></div>
    
    <div class="container mt-4">
        <h1>BLR Shared Frontend Test</h1>
        <p>This page tests the navbar functionality from the blr-shared-frontend package.</p>
        
        <div class="mt-4">
            <button id="test-button" class="btn btn-primary">Test Button</button>
        </div>
    </div>

    <script type="module">
        // Test configuration
        const navbarConfig = {
            brand: {
                image: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzYiIGhlaWdodD0iMzYiIHZpZXdCb3g9IjAgMCAzNiAzNiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMTgiIGN5PSIxOCIgcj0iMTgiIGZpbGw9IiM2NjY2NjYiLz4KPC9zdmc+',
                link: '/',
                alt: 'Test logo'
            },
            projects: [
                { name: 'test-project-1', url: 'https://example.com/project1' },
                { name: 'test-project-2', url: 'https://example.com/project2' }
            ],
            about: [
                { name: 'About Us', url: '/about.html' },
                { name: 'Contact', url: '/contact.html' }
            ]
        };

        // Import and test the navbar functionality
        import { initNavbar, initButtons, spinnerOn, spinnerOff, updateNavbarAuth } from './dist/index.js';
        
        // Initialize navbar
        initNavbar(navbarConfig);
        
        // Set up event handlers
        $(document).on('navbar:signin:click', () => {
            alert('Sign in clicked!');
        });
        
        $(document).on('navbar:admin:click', () => {
            alert('Admin clicked!');
        });
        
        $(document).on('navbar:signout:click', () => {
            alert('Sign out clicked!');
        });
        
        // Simulate authentication state
        updateNavbarAuth(false);
        
        // Initialize test button
        initButtons(['test-button']);
        
        // Test spinner functionality
        document.getElementById('test-button').addEventListener('click', function() {
            spinnerOn('test-button');
            setTimeout(() => {
                spinnerOff('test-button');
            }, 2000);
        });
    </script>
</body>
</html>
